  <rect x="166" y="76" width="8" height="8" fill="#07c160"/>
  <rect x="182" y="76" width="8" height="8" fill="#07c160"/>
  <rect x="134" y="92" width="8" height="8" fill="#07c160"/>
  <rect x="166" y="92" width="8" height="8" fill="#07c160"/>
