<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <title>WeChat QR Code — Muntasir Al Mamun</title>
  <!-- White background -->
  <rect width="200" height="200" fill="#ffffff" rx="12"/>

  <!-- Top-left finder pattern (outer) -->
  <rect x="10" y="10" width="56" height="56" fill="#07c160" rx="4"/>
  <rect x="17" y="17" width="42" height="42" fill="#ffffff" rx="2"/>
  <rect x="24" y="24" width="28" height="28" fill="#07c160" rx="2"/>

  <!-- Top-right finder pattern (outer) -->
  <rect x="134" y="10" width="56" height="56" fill="#07c160" rx="4"/>
  <rect x="141" y="17" width="42" height="42" fill="#ffffff" rx="2"/>
  <rect x="148" y="24" width="28" height="28" fill="#07c160" rx="2"/>

  <!-- Bottom-left finder pattern (outer) -->
  <rect x="10" y="134" width="56" height="56" fill="#07c160" rx="4"/>
  <rect x="17" y="141" width="42" height="42" fill="#ffffff" rx="2"/>
  <rect x="24" y="148" width="28" height="28" fill="#07c160" rx="2"/>

  <!-- Timing pattern (horizontal) -->
